      <path d="M154 109C188 158 222 162 268 150" fill="none" stroke="#23d579" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
      <path d="M394 70C413 78 421 88 426 103" fill="none" stroke="#23d579" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
      <path d="M394 108C410 108 418 108 426 108" fill="none" stroke="#23d579" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
      <path d="M394 150C413 140 421 128 426 113" fill="none" stroke="#23d579" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
      <path d="M154 109C226 104 325 104 426 108" fill="none" stroke="#23d579" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.56" stroke-dasharray="12 12"/>
      <path d="M-15 188C22 142 42 127 65 115" fill="none" stroke="#ff3f38" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" stroke-dasharray="10 12"/>
