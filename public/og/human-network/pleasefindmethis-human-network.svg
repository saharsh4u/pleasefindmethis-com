    <text x="76" y="164" font-size="65" font-weight="960" fill="#ef2f2b">Search stops.</text>
    <text x="76" y="226" font-size="62" font-weight="960" fill="#101214">People keep looking.</text>
    <text x="78" y="265" font-size="23" font-weight="780" fill="#5e625f">For sold-out, discontinued, and hidden-inventory items.</text>

