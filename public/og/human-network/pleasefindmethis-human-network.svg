    <text x="18" y="31" font-size="22" font-weight="930" fill="#101214">Markets</text>
    <text x="18" y="55" font-size="15" font-weight="850" fill="#ef2f2b">dead link</text>
    <g transform="translate(150 14)">
      <circle cx="22" cy="22" r="21" fill="#fff4f2" stroke="#ef2f2b" stroke-width="4"/>
      <path d="M14 14L30 30M30 14L14 30" stroke="#ef2f2b" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
      <g transform="translate(222 143)">
    <rect width="188" height="72" rx="18" fill="#ffffff" stroke="#f0dad2" stroke-width="2"/>
    <text x="18" y="31" font-size="22" font-weight="930" fill="#101214">Alerts</text>
    <text x="18" y="55" font-size="15" font-weight="850" fill="#ef2f2b">no exact hit</text>
    <g transform="translate(150 14)">
      <circle cx="22" cy="22" r="21" fill="#fff4f2" stroke="#ef2f2b" stroke-width="4"/>
      <path d="M14 14L30 30M30 14L14 30" stroke="#ef2f2b" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>
    </g>

    <g transform="translate(535 304)">
      <rect width="582" height="212" rx="28" fill="#f2fff8" stroke="#cceede" stroke-width="2"/>
      <text x="26" y="40" font-size="15" font-weight="960" letter-spacing="2" fill="#096b3a">HUMAN FINDER NETWORK</text>
      <path d="M154 109C188 58 222 54 268 70" fill="none" stroke="#23d579" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
