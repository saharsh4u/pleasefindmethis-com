    <text x="72" y="35" text-anchor="middle" font-size="19" font-weight="900" fill="#096b3a">Finder</text>
  </g>
      <g transform="translate(268 48)" filter="url(#nodeShadow)">
    <rect width="126" height="44" rx="22" fill="#ffffff" stroke="#dce6de" stroke-width="2"/>
    <text x="63" y="29" text-anchor="middle" font-size="15" font-weight="900" fill="#101214">Collector</text>
  </g>
      <g transform="translate(268 86)" filter="url(#nodeShadow)">
    <rect width="126" height="44" rx="22" fill="#ffffff" stroke="#dce6de" stroke-width="2"/>
    <text x="63" y="29" text-anchor="middle" font-size="15" font-weight="900" fill="#101214">Warehouse</text>
  </g>
      <g transform="translate(268 130)" filter="url(#nodeShadow)">
    <rect width="126" height="44" rx="22" fill="#ffffff" stroke="#dce6de" stroke-width="2"/>
    <text x="63" y="29" text-anchor="middle" font-size="15" font-weight="900" fill="#101214">Local shop</text>
  </g>

      <g transform="translate(426 64)" filter="url(#greenGlow)">
        <rect width="136" height="104" rx="24" fill="#effff7" stroke="#23d579" stroke-width="3"/>
        <text x="68" y="32" text-anchor="middle" font-size="14" font-weight="950" letter-spacing="1.2" fill="#096b3a">SOURCE LEAD</text>
        <rect x="17" y="45" width="102" height="30" rx="15" fill="#ffffff" stroke="#cbeade" stroke-width="2"/>
