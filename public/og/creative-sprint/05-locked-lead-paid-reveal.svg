<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>Locked Lead, Paid Reveal</title>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#102018" flood-opacity="0.14"/>
    </filter>
    <filter id="hard" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b6d3b"/>
      <stop offset="100%" stop-color="#2aa4bc"/>
    </linearGradient>
    <linearGradient id="warmPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff4e3"/>
    </linearGradient>
    <linearGradient id="redPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffafa"/>
      <stop offset="100%" stop-color="#fff0ee"/>
    </linearGradient>
    <linearGradient id="coolPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eafff6"/>
    </linearGradient>
    <clipPath id="photoClip"><rect x="0" y="0" width="1" height="1" rx="0"/></clipPath>
    <style>
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Roboto Mono", Consolas, monospace; }
      text { dominant-baseline: alphabetic; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="#090d0b"/>
  <g class="sans">

    <rect width="1200" height="630" fill="#09110d"/>
    <rect x="50" y="38" width="1100" height="554" rx="34" fill="#fbfcf8" filter="url(#shadow)"/>
    <g transform="translate(78 68)">
    <circle cx="18" cy="18" r="18" fill="#0b6d3b"/>
    <circle cx="16" cy="16" r="8.4" fill="none" stroke="#ffffff" stroke-width="4"/>
    <path d="M23 24L32 33" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="48" y="26" font-size="24" font-weight="880" fill="#101412">pleasefindmethis.com</text>
  </g>
    <text x="82" y="150" font-size="48" font-weight="930" letter-spacing="0" fill="#101412">Find the exact item.</text>
<text x="82" y="200.4" font-size="48" font-weight="930" letter-spacing="0" fill="#101412">Keep your source protected.</text>
    <text x="86" y="252" font-size="22" font-weight="690" fill="#57615b">For finders with valuable leads: source reveal comes after review.</text>
    <rect x="82" y="310" width="500" height="214" rx="28" fill="#fff4f1" stroke="#eed8d4" stroke-width="2"/>
    <text x="114" y="354" font-size="16" font-weight="900" letter-spacing="1.8" fill="#c23b2b">PUBLIC COMMENT THREAD</text>
    <rect x="116" y="378" width="348" height="42" rx="20" fill="#ffffff"/><text x="138" y="405" font-size="16" font-weight="790" fill="#101412">I found it here: seller-link.com/item</text>
    <rect x="178" y="434" width="270" height="42" rx="20" fill="#ffffff"/><text x="200" y="461" font-size="16" font-weight="790" fill="#101412">source copied in DMs</text>
    <g transform="translate(480 398) rotate(-8)" filter="url(#hard)">
    <circle cx="0" cy="0" r="68" fill="#ffffff" opacity="0.90" stroke="#ef3831" stroke-width="7"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#ef3831" stroke-width="3.5" stroke-dasharray="8 9"/>
    <text x="0" y="-8" text-anchor="middle" font-size="22" font-weight="950" letter-spacing="0.8" fill="#ef3831">SOURCE</text>
<text x="0" y="22" text-anchor="middle" font-size="22" font-weight="950" letter-spacing="0.8" fill="#ef3831">LEAKED</text>
    <path d="M-38 -34H38M-38 37H38" stroke="#ef3831" stroke-width="4" stroke-linecap="round"/>
  </g>
    <rect x="625" y="310" width="493" height="214" rx="28" fill="#effcf5" stroke="#cbe9dc" stroke-width="2"/>
    <text x="657" y="354" font-size="16" font-weight="900" letter-spacing="1.8" fill="#0b6d3b">PROTECTED FINDER LEAD</text>
    <rect x="658" y="382" width="410" height="72" rx="20" fill="#ffffff" stroke="#d6e1da"/>
    <path d="M698 421V407C698 392 709 382 724 382C739 382 750 392 750 407V421" fill="none" stroke="#0b6d3b" stroke-width="6" stroke-linecap="round"/>
    <rect x="690" y="418" width="68" height="45" rx="12" fill="#0b6d3b"/>
    <text x="786" y="419" font-size="21" font-weight="900" fill="#101412">seller-link.com/...</text>
    <text x="786" y="446" font-size="16" font-weight="730" fill="#57615b">recorded before source reveal</text>
    <g transform="translate(658 470)">
    <rect width="285" height="38" rx="19" fill="#0b6d3b"/>
    <text x="142.5" y="25" text-anchor="middle" font-size="15" font-weight="850" letter-spacing="0.6" fill="#fff">Finder payout for accepted source</text>
  </g>
    <g transform="translate(1034 380) rotate(8)" filter="url(#hard)">
    <circle cx="0" cy="0" r="66" fill="#ffffff" opacity="0.90" stroke="#19be64" stroke-width="7"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#19be64" stroke-width="3.5" stroke-dasharray="8 9"/>
    <text x="0" y="-8" text-anchor="middle" font-size="22" font-weight="950" letter-spacing="0.8" fill="#19be64">PROTECTED</text>
<text x="0" y="22" text-anchor="middle" font-size="22" font-weight="950" letter-spacing="0.8" fill="#19be64">SOURCE</text>
    <path d="M-36 -32H36M-36 35H36" stroke="#19be64" stroke-width="4" stroke-linecap="round"/>
  </g>
    <rect x="82" y="545" width="1036" height="31" rx="15" fill="#101412"/>
    <text x="104" y="566" font-size="15" font-weight="760" fill="#fff">Submit a source lead for a funded request without exposing it for free.</text>
  </g>
</svg>
