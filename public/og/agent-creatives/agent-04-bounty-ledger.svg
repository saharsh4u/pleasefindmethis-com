<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Roboto Mono", Consolas, monospace; }
      .label { font-size: 13px; font-weight: 850; letter-spacing: 1.6px; }
      .ink { fill: #1c211d; }
      .muted { fill: #6f746e; }
    </style>

    <pattern id="deskGrid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#29302b" stroke-width="1" opacity="0.55"/>
      <path d="M27 0V54M0 27H54" fill="none" stroke="#202720" stroke-width="1" opacity="0.32"/>
    </pattern>

    <pattern id="receiptLines" width="8" height="28" patternUnits="userSpaceOnUse">
      <path d="M0 27.5H8" stroke="#e1d7c4" stroke-width="1"/>
    </pattern>

    <linearGradient id="deskGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18201b"/>
      <stop offset="54%" stop-color="#0c1110"/>
      <stop offset="100%" stop-color="#151719"/>
    </linearGradient>

    <linearGradient id="receiptPaper" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#fffdf4"/>
      <stop offset="64%" stop-color="#f5eddc"/>
      <stop offset="100%" stop-color="#e9ddc6"/>
    </linearGradient>

    <linearGradient id="vaultFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#273339"/>
      <stop offset="56%" stop-color="#10171a"/>
      <stop offset="100%" stop-color="#06090b"/>
    </linearGradient>

    <linearGradient id="rewardGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3ad"/>
      <stop offset="52%" stop-color="#e3aa3a"/>
      <stop offset="100%" stop-color="#a96820"/>
    </linearGradient>

    <linearGradient id="sourceGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#20b26b"/>
      <stop offset="100%" stop-color="#2e9ab2"/>
    </linearGradient>

    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>

    <filter id="photoShadow" x="-18%" y="-18%" width="136%" height="146%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.32"/>
    </filter>

    <filter id="vaultShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000000" flood-opacity="0.44"/>
    </filter>

    <filter id="stampShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <clipPath id="clipBlanket">
      <rect x="0" y="0" width="168" height="128" rx="12"/>
    </clipPath>
    <clipPath id="clipMug">
      <rect x="0" y="0" width="152" height="116" rx="12"/>
    </clipPath>
    <clipPath id="clipWatch">
      <rect x="0" y="0" width="188" height="112" rx="12"/>
    </clipPath>
    <clipPath id="clipDuck">
      <rect x="0" y="0" width="140" height="112" rx="12"/>
    </clipPath>
    <clipPath id="vaultSlot">
      <rect x="0" y="0" width="254" height="58" rx="12"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#deskGlow)"/>
  <rect width="1200" height="630" fill="url(#deskGrid)" opacity="0.72"/>
  <path d="M28 548C210 520 370 548 545 516C711 486 878 496 1130 450" fill="none" stroke="#314139" stroke-width="1.5" opacity="0.38"/>
  <path d="M94 92C251 72 403 86 588 62C775 38 930 52 1116 28" fill="none" stroke="#27362f" stroke-width="1.2" opacity="0.45"/>

  <g class="sans">
    <g transform="translate(72 54)">
      <circle cx="24" cy="24" r="22" fill="#f6f1df"/>
      <circle cx="21" cy="21" r="9.5" fill="none" stroke="#111815" stroke-width="4.8"/>
      <path d="M29 30L40 41" stroke="#111815" stroke-width="5.6" stroke-linecap="round"/>
      <text x="58" y="21" font-size="25" font-weight="900" fill="#f8f3e6">pleasefindmethis.com</text>
      <text x="59" y="47" font-size="15" font-weight="760" fill="#b9c3b7">internet bounty board for impossible-to-find things</text>
    </g>

    <g transform="translate(882 61)">
      <rect width="244" height="42" rx="21" fill="#f6f1df" opacity="0.96"/>
      <circle cx="24" cy="21" r="7" fill="#20b26b"/>
      <text x="43" y="27" font-size="14" font-weight="900" letter-spacing="1.8" fill="#18201b">PROTECTED REVIEW</text>
    </g>
  </g>

  <g transform="translate(72 140) rotate(-3)" filter="url(#photoShadow)">
    <rect x="-10" y="-12" width="188" height="168" rx="18" fill="#f7f2df"/>
    <image href="../../find-requests/childhood-blanket.jpg" x="0" y="0" width="168" height="128" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipBlanket)"/>
    <rect x="0" y="0" width="168" height="128" rx="12" fill="none" stroke="#ffffff" stroke-width="6"/>
    <path d="M42 -10L93 -16L97 7L45 12Z" fill="#c9a55a" opacity="0.9"/>
    <text class="sans" x="12" y="151" font-size="15" font-weight="820" fill="#242921">exact pattern</text>
  </g>

  <g transform="translate(288 108) rotate(5)" filter="url(#photoShadow)">
    <rect x="-10" y="-12" width="172" height="156" rx="18" fill="#f7f2df"/>
    <image href="../../find-requests/living-and-co-mug.jpg" x="0" y="0" width="152" height="116" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipMug)"/>
    <rect x="0" y="0" width="152" height="116" rx="12" fill="none" stroke="#ffffff" stroke-width="6"/>
    <path d="M43 -10L94 -16L98 6L46 13Z" fill="#78a8a0" opacity="0.9"/>
    <text class="sans" x="12" y="139" font-size="15" font-weight="820" fill="#242921">not a dupe</text>
  </g>

  <g transform="translate(944 384) rotate(3)" filter="url(#photoShadow)">
    <rect x="-10" y="-12" width="208" height="154" rx="18" fill="#f7f2df"/>
    <image href="../../find-requests/seiko-wired-watch.jpg" x="0" y="0" width="188" height="112" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipWatch)"/>
    <rect x="0" y="0" width="188" height="112" rx="12" fill="none" stroke="#ffffff" stroke-width="6"/>
    <path d="M69 -10L126 -16L130 7L72 13Z" fill="#c75245" opacity="0.9"/>
    <text class="sans" x="12" y="136" font-size="15" font-weight="820" fill="#242921">model matters</text>
  </g>

  <g transform="translate(818 126) rotate(-5)" filter="url(#photoShadow)">
    <rect x="-10" y="-12" width="160" height="152" rx="18" fill="#f7f2df"/>
    <image href="../../find-requests/duck-wall-art-reddit.jpg" x="0" y="0" width="140" height="112" preserveAspectRatio="xMidYMid slice" clip-path="url(#clipDuck)"/>
    <rect x="0" y="0" width="140" height="112" rx="12" fill="none" stroke="#ffffff" stroke-width="6"/>
    <path d="M44 -10L94 -16L98 7L47 12Z" fill="#e3aa3a" opacity="0.9"/>
    <text class="sans" x="12" y="136" font-size="15" font-weight="820" fill="#242921">source lead</text>
  </g>

  <g transform="translate(318 150)" filter="url(#paperShadow)">
    <path d="M24 0H555C568 0 579 11 579 24V404C579 418 568 429 554 429H24C11 429 0 418 0 404V24C0 11 11 0 24 0Z" fill="url(#receiptPaper)"/>
    <path d="M0 39C13 43 24 35 37 39C50 43 61 35 74 39C87 43 98 35 111 39C124 43 135 35 148 39C161 43 172 35 185 39C198 43 209 35 222 39C235 43 246 35 259 39C272 43 283 35 296 39C309 43 320 35 333 39C346 43 357 35 370 39C383 43 394 35 407 39C420 43 431 35 444 39C457 43 468 35 481 39C494 43 505 35 518 39C531 43 542 35 555 39C566 42 573 37 579 35V25C579 11 568 0 555 0H24C11 0 0 11 0 24V39Z" fill="#fff8e9"/>
    <rect x="0" y="64" width="579" height="310" fill="url(#receiptLines)" opacity="0.5"/>

    <g class="sans" transform="translate(36 31)">
      <text class="label" x="0" y="0" fill="#b26d24">BOUNTY RECEIPT</text>
      <text x="0" y="65" font-size="49" font-weight="940" letter-spacing="0" fill="#1b201d">Fund the search.</text>
      <text x="0" y="118" font-size="49" font-weight="940" letter-spacing="0" fill="#1b201d">Protect the source.</text>
      <text x="3" y="154" font-size="20" font-weight="720" fill="#5f625c">Structured bounties with review before reveal.</text>
    </g>

    <g transform="translate(39 205)">
      <rect width="244" height="88" rx="18" fill="#ffffff" stroke="#decfb1" stroke-width="1.5"/>
      <text class="sans label" x="21" y="30" fill="#6e5a2f">REWARD POSTED</text>
      <text class="sans" x="20" y="67" font-size="37" font-weight="950" fill="#1b201d">US$50</text>
      <g transform="translate(171 19)">
        <circle cx="25" cy="25" r="25" fill="url(#rewardGold)"/>
        <text class="mono" x="25" y="34" text-anchor="middle" font-size="28" font-weight="900" fill="#1d1710">$</text>
      </g>
    </g>

    <g class="sans" transform="translate(313 205)">
      <rect width="226" height="88" rx="18" fill="#ffffff" stroke="#c7d8cf" stroke-width="1.5"/>
      <text class="label" x="20" y="30" fill="#17724b">SOURCE STATUS</text>
      <path d="M23 59V49C23 37 31 29 43 29C55 29 63 37 63 49V59" fill="none" stroke="#17724b" stroke-width="5" stroke-linecap="round"/>
      <rect x="17" y="56" width="52" height="34" rx="9" fill="#17724b"/>
      <circle cx="43" cy="72" r="4" fill="#f5fbf2"/>
      <path d="M43 76V83" stroke="#f5fbf2" stroke-width="3" stroke-linecap="round"/>
      <text x="84" y="66" font-size="24" font-weight="900" fill="#1b201d">Locked</text>
    </g>

    <g class="sans" transform="translate(39 314)">
      <rect width="500" height="74" rx="18" fill="#fff9ec" stroke="#decfb1" stroke-width="1.5"/>
      <g transform="translate(21 20)">
        <circle cx="17" cy="17" r="17" fill="#1f2a2d"/>
        <path d="M9 17H25M19 10L27 17L19 24" fill="none" stroke="#fff9ec" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="72" y="31" font-size="16" font-weight="900" fill="#1b201d">Finder submits a lead</text>
      <text x="72" y="55" font-size="15" font-weight="680" fill="#5f625c">Source saved first. Poster reviews request rules.</text>
    </g>

    <g transform="translate(510 157) rotate(-9)" filter="url(#stampShadow)">
      <circle cx="0" cy="0" r="51" fill="#fff8e9" opacity="0.84" stroke="#c75245" stroke-width="5"/>
      <circle cx="0" cy="0" r="39" fill="none" stroke="#c75245" stroke-width="2.5" stroke-dasharray="6 7"/>
      <text class="sans" x="0" y="-6" text-anchor="middle" font-size="17" font-weight="950" letter-spacing="1" fill="#c75245">REVIEW</text>
      <text class="sans" x="0" y="17" text-anchor="middle" font-size="17" font-weight="950" letter-spacing="1" fill="#c75245">BEFORE</text>
      <text class="sans" x="0" y="39" text-anchor="middle" font-size="17" font-weight="950" letter-spacing="1" fill="#c75245">REVEAL</text>
    </g>
  </g>

  <g transform="translate(900 220) scale(0.82)" filter="url(#vaultShadow)">
    <rect x="0" y="0" width="306" height="235" rx="26" fill="url(#vaultFace)"/>
    <rect x="19" y="20" width="268" height="195" rx="18" fill="#172226" stroke="#3a484c" stroke-width="2"/>
    <g transform="translate(26 28)">
      <rect width="254" height="58" fill="#0a1113" clip-path="url(#vaultSlot)"/>
      <rect x="0" y="0" width="254" height="58" rx="12" fill="none" stroke="#435156" stroke-width="1.5"/>
      <text class="mono" x="19" y="35" font-size="16" font-weight="760" fill="#cdd9d0">source://lead-saved</text>
      <rect x="182" y="13" width="53" height="32" rx="16" fill="#202b2e" stroke="#526066"/>
      <circle cx="213" cy="29" r="10" fill="#20b26b"/>
    </g>
    <g transform="translate(26 96)">
      <rect width="254" height="58" rx="12" fill="#f4ead8"/>
      <text class="sans label" x="18" y="25" fill="#17724b">POSTER REVIEW</text>
      <text class="sans" x="18" y="45" font-size="15" font-weight="760" fill="#1d2421">must-haves, seller lead, fit</text>
    </g>
    <g transform="translate(26 164)">
      <rect width="254" height="39" rx="12" fill="#10181b" stroke="#435156"/>
      <path d="M19 20L29 30L47 12" fill="none" stroke="#20b26b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="sans" x="62" y="26" font-size="16" font-weight="850" fill="#f4ead8">accepted source path</text>
    </g>

    <g transform="translate(208 -52)">
      <circle cx="52" cy="52" r="50" fill="#f4ead8" stroke="#10181b" stroke-width="6"/>
      <path d="M33 53V42C33 31 41 23 52 23C63 23 71 31 71 42V53" fill="none" stroke="#10181b" stroke-width="6" stroke-linecap="round"/>
      <rect x="26" y="49" width="52" height="41" rx="12" fill="url(#sourceGreen)"/>
      <circle cx="52" cy="67" r="5" fill="#f4ead8"/>
      <path d="M52 72V80" stroke="#f4ead8" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

</svg>
