      <circle cx="904" cy="220" r="3.5"/>
      <circle cx="896" cy="411" r="3"/>
      <circle cx="642" cy="405" r="4"/>
      <circle cx="833" cy="170" r="2.8"/>
    </g>
  </g>

  <circle cx="765" cy="322" r="217" fill="none" stroke="#d4fff4" stroke-opacity="0.34" stroke-width="2"/>
  <circle cx="765" cy="322" r="228" fill="none" stroke="#42f1b5" stroke-opacity="0.2" stroke-width="8"/>

  <g filter="url(#deep-shadow)">
    <rect x="716" y="195" width="315" height="264" rx="34" fill="url(#protected-panel)"/>
    <rect x="716" y="195" width="315" height="264" rx="34" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    <text class="sans" x="747" y="232" font-size="14" font-weight="930" letter-spacing="2" fill="#0a7b48">SOURCE SIGNAL LOCKED</text>
    <rect x="754" y="237" width="180" height="134" rx="29" fill="url(#photo-ring)"/>
