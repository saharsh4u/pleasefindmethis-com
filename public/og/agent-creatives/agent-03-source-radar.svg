    <rect x="759" y="242" width="170" height="124" rx="24" fill="none" stroke="#ffffff" stroke-width="5"/>
    <g transform="translate(900 331)">
      <circle cx="0" cy="0" r="30" fill="#08251b" stroke="#dfffee" stroke-width="4"/>
      <path d="M-11 -2V-10C-11 -21 11 -21 11 -10V-2" fill="none" stroke="#69f5bd" stroke-width="5" stroke-linecap="round"/>
      <rect x="-17" y="-3" width="34" height="26" rx="8" fill="#69f5bd"/>
      <circle cx="0" cy="10" r="3.8" fill="#08251b"/>
    </g>
    <g class="sans">
      <text x="748" y="404" font-size="27" font-weight="920" fill="#101814">Source saved before reveal</text>
      <text x="748" y="431" font-size="18" font-weight="680" fill="#476257">Finder lead is recorded, then the poster reviews it.</text>
    </g>
