    <path d="M551 322H979M765 108V536M614 171L916 473M916 171L614 473" stroke="#97ffe4" stroke-width="1.2" opacity="0.23"/>
    <circle cx="765" cy="322" r="52" fill="none" stroke="#a7ffe8" stroke-width="1.5" opacity="0.28"/>
    <circle cx="765" cy="322" r="103" fill="none" stroke="#a7ffe8" stroke-width="1.5" opacity="0.24"/>
    <circle cx="765" cy="322" r="156" fill="none" stroke="#a7ffe8" stroke-width="1.5" opacity="0.22"/>
    <circle cx="765" cy="322" r="211" fill="none" stroke="#a7ffe8" stroke-width="1.5" opacity="0.26"/>
