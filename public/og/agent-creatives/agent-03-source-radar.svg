    <text x="577" y="575" font-size="17" font-weight="780" fill="#dffff4">exact item, not a dupe</text>
    <rect x="884" y="548" width="251" height="42" rx="21" fill="#12392f" stroke="#5effce" stroke-opacity="0.3"/>
    <text x="909" y="575" font-size="17" font-weight="780" fill="#dffff4">protected source reveal</text>
