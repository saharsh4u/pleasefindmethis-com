<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">pleasefindmethis.com source radar social preview</title>
  <desc id="desc">A radar scanner transforms noisy item search results into one protected source signal.</desc>
  <defs>
    <radialGradient id="bg" cx="68%" cy="50%" r="73%">
      <stop offset="0%" stop-color="#12382f"/>
      <stop offset="45%" stop-color="#0b1d1c"/>
      <stop offset="100%" stop-color="#070909"/>
    </radialGradient>
    <radialGradient id="radar-fill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1cf2a2" stop-opacity="0.18"/>
      <stop offset="68%" stop-color="#0fb981" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#081211" stop-opacity="0.06"/>
    </radialGradient>
    <linearGradient id="scan-wedge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#77ffe0" stop-opacity="0"/>
      <stop offset="58%" stop-color="#57f7ba" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#19c973" stop-opacity="0.54"/>
    </linearGradient>
    <linearGradient id="protected-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fff9"/>
      <stop offset="100%" stop-color="#dff8ea"/>
    </linearGradient>
    <linearGradient id="noise-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="beam-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b6cff" stop-opacity="0.06"/>
      <stop offset="54%" stop-color="#31d5ff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#27e789"/>
    </linearGradient>
    <linearGradient id="photo-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#68ffe1"/>
      <stop offset="52%" stop-color="#24e17f"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="deep-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="soft-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="small-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <clipPath id="clip-radar">
      <circle cx="765" cy="322" r="214"/>
    </clipPath>
    <clipPath id="clip-watch">
      <rect x="759" y="242" width="170" height="124" rx="24"/>
    </clipPath>
    <clipPath id="clip-mug">
      <circle cx="214" cy="167" r="42"/>
    </clipPath>
    <clipPath id="clip-blanket">
      <circle cx="332" cy="270" r="40"/>
    </clipPath>
    <clipPath id="clip-duck">
      <circle cx="176" cy="369" r="38"/>
    </clipPath>
    <clipPath id="clip-shirt">
      <circle cx="392" cy="425" r="35"/>
    </clipPath>
    <pattern id="micro-grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#a8f7dc" stroke-width="0.8" opacity="0.08"/>
    </pattern>
    <style>
      .sans { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Roboto Mono", Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#micro-grid)"/>
  <path d="M-38 522C150 453 222 553 389 475C556 397 620 196 817 164C997 135 1078 238 1248 146V630H-38Z" fill="#143f36" opacity="0.28"/>
  <path d="M-30 113C138 83 226 126 357 92C484 58 574 16 716 65C884 123 1003 111 1230 31" fill="none" stroke="#59ffd2" stroke-width="1.1" opacity="0.13"/>
  <path d="M46 565C221 502 324 559 490 505C679 443 749 498 910 452C1047 413 1120 442 1197 401" fill="none" stroke="#9b6cff" stroke-width="1.2" opacity="0.16"/>

  <g class="sans">
    <g transform="translate(64 54)">
      <circle cx="19" cy="19" r="18" fill="#eafff4"/>
      <circle cx="16" cy="16" r="8.4" fill="none" stroke="#0b6d3b" stroke-width="4"/>
      <path d="M23 24L32 33" stroke="#0b6d3b" stroke-width="5" stroke-linecap="round"/>
      <text x="48" y="26" font-size="24" font-weight="850" fill="#f8fff9">pleasefindmethis.com</text>
    </g>

    <g transform="translate(877 53)">
      <rect width="258" height="40" rx="20" fill="#eafff4" opacity="0.96"/>
      <circle cx="25" cy="20" r="6" fill="#16b86c"/>
      <text x="43" y="26" font-size="14" font-weight="880" letter-spacing="1.8" fill="#0d2119">PROTECTED SOURCE</text>
    </g>

    <text x="63" y="134" font-size="58" font-weight="930" letter-spacing="-0.8" fill="#ffffff">Turn search noise into</text>
    <text x="63" y="194" font-size="58" font-weight="930" letter-spacing="-0.8" fill="#baffdf">one protected source.</text>
    <text x="66" y="232" font-size="23" font-weight="650" fill="#c2d6ce">Fund a request. Let finders submit a lead. Record the source before reveal.</text>
  </g>

  <g filter="url(#small-shadow)">
    <rect x="56" y="276" width="455" height="248" rx="30" fill="url(#noise-panel)" stroke="#ffffff" stroke-opacity="0.14"/>
    <text class="sans" x="86" y="318" font-size="15" font-weight="900" letter-spacing="2.1" fill="#ffb1b1">NORMAL SEARCH NOISE</text>
    <g class="sans" font-size="15" font-weight="760">
      <rect x="86" y="342" width="132" height="34" rx="17" fill="#321b22" stroke="#ff8e8e" stroke-opacity="0.35"/>
      <text x="108" y="364" fill="#ffc9c9">near match</text>
      <rect x="239" y="337" width="108" height="34" rx="17" fill="#1d2230" stroke="#83caff" stroke-opacity="0.3"/>
      <text x="260" y="359" fill="#c6e7ff">sold out</text>
      <rect x="363" y="351" width="102" height="34" rx="17" fill="#282132" stroke="#c6a8ff" stroke-opacity="0.35"/>
      <text x="382" y="373" fill="#dfd2ff">wrong ID</text>
      <rect x="248" y="394" width="137" height="34" rx="17" fill="#241e17" stroke="#ffd166" stroke-opacity="0.34"/>
      <text x="269" y="416" fill="#ffe3a3">dead listing</text>
      <rect x="101" y="433" width="157" height="34" rx="17" fill="#1b2c29" stroke="#5cf5ce" stroke-opacity="0.28"/>
      <text x="122" y="455" fill="#b9fff0">public comment</text>
    </g>
  </g>

  <g filter="url(#small-shadow)">
    <image href="../../find-requests/living-and-co-mug.jpg" x="172" y="125" width="84" height="84" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-mug)"/>
    <circle cx="214" cy="167" r="43" fill="none" stroke="#ffffff" stroke-opacity="0.82" stroke-width="4"/>
    <circle cx="214" cy="167" r="58" fill="none" stroke="#ff8e8e" stroke-width="2" stroke-dasharray="3 9" opacity="0.55"/>

    <image href="../../find-requests/childhood-blanket.jpg" x="292" y="230" width="80" height="80" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-blanket)"/>
    <circle cx="332" cy="270" r="41" fill="none" stroke="#ffffff" stroke-opacity="0.78" stroke-width="4"/>
    <circle cx="332" cy="270" r="55" fill="none" stroke="#ffd166" stroke-width="2" stroke-dasharray="3 9" opacity="0.5"/>

    <image href="../../find-requests/duck-wall-art-reddit.jpg" x="138" y="331" width="76" height="76" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-duck)"/>
    <circle cx="176" cy="369" r="39" fill="none" stroke="#ffffff" stroke-opacity="0.76" stroke-width="4"/>
    <circle cx="176" cy="369" r="52" fill="none" stroke="#9b6cff" stroke-width="2" stroke-dasharray="3 9" opacity="0.52"/>

    <image href="../../find-requests/vintage-shirt.jpg" x="357" y="390" width="70" height="70" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-shirt)"/>
    <circle cx="392" cy="425" r="36" fill="none" stroke="#ffffff" stroke-opacity="0.76" stroke-width="4"/>
    <circle cx="392" cy="425" r="49" fill="none" stroke="#4ed8ff" stroke-width="2" stroke-dasharray="3 9" opacity="0.48"/>
  </g>

  <g opacity="0.82">
    <path d="M218 167C340 158 403 217 503 247C586 272 633 260 702 315" fill="none" stroke="url(#beam-line)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M334 270C436 282 496 303 572 319C619 329 666 325 705 322" fill="none" stroke="url(#beam-line)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M176 369C286 373 372 363 480 349C574 337 631 340 704 325" fill="none" stroke="url(#beam-line)" stroke-width="3.5" stroke-linecap="round"/>
