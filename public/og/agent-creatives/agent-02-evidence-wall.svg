      <text x="15" y="24" font-size="12" font-weight="900" letter-spacing="1.5" fill="#5a655e">CASE ID</text>
      <text x="15" y="55" font-size="28" font-weight="950" fill="#121717">PFM-042</text>
      <circle cx="111" cy="14" r="8" fill="#c52e2e"/>
