<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="board-shadow" x="-5%" y="-8%" width="110%" height="116%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#020403" flood-opacity="0.45"/>
    </filter>
    <filter id="paper-shadow" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#0a0d0a" flood-opacity="0.26"/>
    </filter>
    <filter id="photo-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#0a0d0a" flood-opacity="0.38"/>
    </filter>
    <filter id="ink-wobble" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8"/>
    </filter>
    <filter id="paper-noise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply"/>
    </filter>
    <pattern id="cork-speckle" width="38" height="38" patternUnits="userSpaceOnUse">
      <rect width="38" height="38" fill="#8b694a"/>
      <circle cx="6" cy="8" r="1.8" fill="#5c3d2c" opacity="0.42"/>
      <circle cx="24" cy="13" r="2.2" fill="#b48a61" opacity="0.38"/>
      <circle cx="16" cy="28" r="1.5" fill="#5b7a63" opacity="0.32"/>
      <path d="M4 31C11 25 20 24 34 28" fill="none" stroke="#6d503d" stroke-width="1" opacity="0.32"/>
      <path d="M18 5C25 8 31 8 37 5" fill="none" stroke="#a27b59" stroke-width="1" opacity="0.36"/>
    </pattern>
    <pattern id="paper-lines" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="transparent"/>
      <path d="M0 33.5H34" stroke="#b9c4bb" stroke-width="1" opacity="0.38"/>
    </pattern>
    <clipPath id="main-photo-clip">
      <rect x="0" y="0" width="315" height="255" rx="4"/>
    </clipPath>
    <clipPath id="watch-photo-clip">
      <rect x="0" y="0" width="170" height="122" rx="3"/>
    </clipPath>
    <clipPath id="mug-photo-clip">
      <rect x="0" y="0" width="142" height="142" rx="3"/>
    </clipPath>
    <clipPath id="duck-photo-clip">
      <rect x="0" y="0" width="155" height="118" rx="3"/>
    </clipPath>
    <style>
      .sans { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", "Roboto Mono", Consolas, monospace; }
      .stamp { font-family: Impact, "Arial Black", Inter, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#111918"/>
