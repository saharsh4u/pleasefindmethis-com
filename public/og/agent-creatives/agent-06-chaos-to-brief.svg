    <rect x="727" y="199" width="182" height="182" rx="22" fill="none" stroke="#fffdf5" stroke-width="6"/>

    <g transform="translate(934 236)">
      <text x="0" y="0" font-size="17" font-weight="880" fill="#188c5c">EXACT ITEM REQUEST</text>
      <text x="0" y="40" font-size="40" font-weight="930" fill="#17252b">Find this</text>
      <text x="0" y="82" font-size="40" font-weight="930" fill="#17252b">source.</text>
      <text x="0" y="119" font-size="18" font-weight="720" fill="#52605c">real seller lead or</text>
      <text x="0" y="143" font-size="18" font-weight="720" fill="#52605c">purchase path required</text>
    </g>

    <g transform="translate(712 421)">
