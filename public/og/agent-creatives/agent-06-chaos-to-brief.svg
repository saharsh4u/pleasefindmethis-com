    <rect x="39" y="35" width="54" height="35" rx="10" fill="#25b06b"/>
    <circle cx="66" cy="51" r="5" fill="#17252b"/>
    <path d="M66 55V63" stroke="#17252b" stroke-width="4" stroke-linecap="round"/>
    <text x="111" y="32" font-size="18" font-weight="900" fill="#fffdf5">source recorded</text>
    <text x="111" y="56" font-size="15" font-weight="720" fill="#b7c6c0">before reveal</text>
