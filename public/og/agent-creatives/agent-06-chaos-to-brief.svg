        <path d="M8 18L15 25L27 10" fill="none" stroke="#188c5c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="48" y="16" font-size="17" font-weight="850" fill="#17252b">Must match reference photo</text>
        <text x="48" y="42" font-size="15" font-weight="700" fill="#65706d">no lookalikes, no public lead leakage</text>
      </g>
    </g>

    <g transform="translate(712 523)">
