      <text x="61" y="25" font-size="15" font-weight="830" fill="#1b2a2f">protected source reveal</text>
    </g>

    <text x="60" y="124" font-size="54" font-weight="930" fill="#fffdf5">Turn search chaos</text>
    <text x="60" y="176" font-size="54" font-weight="930" fill="#fffdf5">into a bounty brief.</text>
    <text x="62" y="214" font-size="22" font-weight="690" fill="#cbd7d3">Fund the request. Record the source. Let the poster review the lead.</text>
  </g>

