      <circle cx="18" cy="18" r="9" fill="none" stroke="#17252b" stroke-width="4"/>
      <path d="M25 26L36 37" stroke="#17252b" stroke-width="5" stroke-linecap="round"/>
      <text x="55" y="29" font-size="24" font-weight="880" fill="#fffdf5">pleasefindmethis.com</text>
