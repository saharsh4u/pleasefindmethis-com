    <linearGradient id="photo-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd766" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2ecb7c" stop-opacity="0.18"/>
